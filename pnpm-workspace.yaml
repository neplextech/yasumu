packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  core-js: false
  core-js-pure: false
  esbuild: false
  msw: false
  sharp: false
  unrs-resolver: false

catalogs:
  build:
    '@types/node': ^24.6.2
    typescript: ^7.0.2
  nextjs:
    typescript: ^5
  react:
    '@types/react': ^19.2.17
    '@types/react-dom': ^19.2.3
    '@vercel/analytics': ^1.6.1
    babel-plugin-react-compiler: ^1.0.0
    eslint-config-next: 16.2.10
    next: ^16.2.10
    react: ^19.2.7
    react-dom: ^19.2.7
    react-icons: ^5.7.0
  tailwind:
    '@tailwindcss/postcss': ^4
    tailwindcss: ^4

overrides:
  dompurify@<3.3.2: '>=3.3.2'
  dompurify@<3.4.0: '>=3.4.0'
  dompurify@<=3.3.1: '>=3.3.2'
  dompurify@<=3.3.3: '>=3.4.0'
  dompurify@>=1.0.10 <3.4.0: '>=3.4.0'
  dompurify@>=3.0.1 <3.4.0: '>=3.4.0'
  dompurify@>=3.1.3 <=3.3.1: '>=3.3.2'
  esbuild@<=0.24.2: '>=0.25.0'
  fast-xml-parser@<5.7.0: '>=5.7.0'
  fast-xml-parser@>=5.0.0 <5.3.5: '>=5.3.5'
  fast-xml-parser@>=5.0.0 <5.3.6: '>=5.3.6'
  fast-xml-parser@>=5.0.0 <5.3.8: '>=5.3.8'
  fast-xml-parser@>=5.0.0 <5.5.6: '>=5.5.6'
  fast-xml-parser@>=5.0.0 <5.5.7: '>=5.5.7'
  fast-xml-parser@>=5.0.9 <=5.3.3: '>=5.3.4'
  postcss@<8.5.10: '>=8.5.10'
  tmp@<=0.2.3: '>=0.2.4'
